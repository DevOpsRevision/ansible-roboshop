- name: Configure Catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: Enable nodejs:20
    ansible.builtin.command: dnf enable nodejs:20 -y

  - name: Insall nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: Create Roboshop System User
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app

  - name: Create Application directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download catalogue Application
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
      dest: /tmp/catalogue.zip

  #This moduel thinks file exist on  anisble control server and it needs to extract on remote machine
  - name: Unzip Application
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes #This means file already exists in this particular server.

  - name: Install nodejs application dependencies
    community.general.npm:
      path: /app
    
  - name: Copy Catalogue systemd service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: systemctl deamon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start & Enable catalogue server
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes

  - name: Copy mongod repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb client
    anisble.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: Check products are loaded or not
    ansible.builtin.command: mongosh --host mongodb.easydevops.fun --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: Print catalogue_output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: Load products
    ansible.builtin.shell: mongosh --host mongodb.easydevops.fun < /app/db/master-data.js
    when: catalogue_output.stdout | int < 0
