- name: Configuring Shipping server
  hosts: shipping
  become: yes
  tasks: 
  - name: Install maven & mysql
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql
    
  - name: Create Roboshop System User
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app

  - name: Create Application directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download Shipping Application
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip"
      dest: /tmp/shipping.zip

  #This moduel thinks file exist on  anisble control server and it needs to extract on remote machine
  - name: Unzip Application
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes #This means file already exists in this particular server.

  - name: Install maven application dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app
    
  - name: Move and rename jar file
    ansible.builtin.command: mv /app/target/shipping.jar /app/shipping.jar

  - name: Copy Shipping systemd service file
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: systemctl deamon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start & Enable shipping server
    ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes

  - name: Install PyMySQL
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - PyMySQL
    - cryptography

  - name: Import the data
    tags:
      import
    community.msql.mysql_db:
      name: all
      login_user: root
      login_password: RoboShop@1
      login_host: mysql.easydevops.fun
      state: import
      target: "{{ item }}"
    loop: 
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql
     
  - name: Restart Shipping
    ansible.builtin.service:
      name: shipping
      state: restarted