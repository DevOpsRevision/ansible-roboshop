- name: Configure Cart server
  hosts: cart
  become: yes
  tasks:
  - name: Disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: Enable nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Insall nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: Create Roboshop System User
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app

  - name: Create Application directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download cart Application
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip"
      dest: /tmp/cart.zip

  #This moduel thinks file exist on  anisble control server and it needs to extract on remote machine
  - name: Unzip Application
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes #This means file already exists in this particular server.

  - name: Install nodejs application dependencies
    community.general.npm:
      path: /app
      state: present
    
  - name: Copy Cart systemd service file
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: systemctl deamon-reload
    ansible.builtin.systemd_service:
      daemon_reload: yes

  - name: Start & Enable cart server
    ansible.builtin.service:
      name: cart
      state: started
      enabled: yes

