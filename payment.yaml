- name: Configuring Payment server
  hosts: payment
  become: yes
  tasks:
  - name: Install python3 packages
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: installed
    loop:
    - python3 
    - gcc 
    - python3-devel

  - name: Create Roboshop System User
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app

  - name: Create Application directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download Payment Application
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip"
      dest: /tmp/payment.zip

  #This moduel thinks file exist on  anisble control server and it needs to extract on remote machine
  - name: Unzip Application
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes #This means file already exists in this particular server.

  - name: Install application dependencies
    ansible.builtin.pip: 
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: Copy Payment systemd service file
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: systemctl deamon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start & Enable payment server
    ansible.builtin.service:
      name: payment
      state: started
      enabled: yes
